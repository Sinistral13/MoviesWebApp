{% extends "base.html" %}

{% block content %}

<h1>Users</h1>

<ul>
    {% for user in users %}
        <li>
            <a href="{{ url_for('get_user_movies', user_id=user.id) }}">
                {{ user.name }}
            </a>
        </li>
    {% endfor %}
</ul>

<h2>Add New User</h2>

<form action="{{ url_for('add_user') }}" method="post">
    <label for="name">Name:</label>
    <input type="text" name="name" id="name" required>

    <button type="submit">Add User</button>
</form>

{% endblock %}
