{% extends "base.html" %}
{% block content %}

<div class="top-bar">
    <div>
        <h1>Movies for {{ user.name }}</h1>
        <p>
            <a href="{{ url_for('index') }}">← Back to Users</a>
        </p>
    </div>

    <!-- ADD MOVIE -->
    <form action="{{ url_for('add_movie', user_id=user.id) }}"
          method="post"
          class="add-movie-form">

        <input type="text"
               name="title"
               placeholder="Movie title"
               required>

        <button class="add-btn" type="submit">
            Add Movie
        </button>
    </form>
</div>
<hr>

<!-- MOVIE LIST -->
<ul>
    {% for movie in movies %}
        <li>
            <div class="movie-card">
                {% if movie.poster_url %}
                    <img src="{{ movie.poster_url }}"
                         alt="{{ movie.title }}"
                         width="120">
                {% endif %}
                <div class="movie-info">
                    <h3>{{ movie.title }} ({{ movie.year }})</h3>
                    <p>
                        <strong>Director:</strong>
                        {{ movie.director }}
                    </p>
                    <!-- UPDATE -->
                    <form action="{{ url_for('update_movie',
                                             user_id=user.id,
                                             movie_id=movie.id) }}"
                          method="post">
                        <input type="text"
                               name="title"
                               placeholder="New title"
                               required>
                        <button class="update-btn" type="submit">
                            Update
                        </button>
                    </form>
                    <!-- DELETE -->
                    <form action="{{ url_for('delete_movie',
                                             user_id=user.id,
                                             movie_id=movie.id) }}"
                          method="post">
                        <button class="delete-btn" type="submit">
                            Delete
                        </button>
                    </form>
                </div>
            </div>
        </li>
        <hr>
    {% endfor %}
</ul>
{% endblock %}
