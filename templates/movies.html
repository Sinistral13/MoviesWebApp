{% extends "base.html" %}

{% block content %}

<h1>Movies for {{ user.name }}</h1>

<!-- Back navigation -->
<p>
    <a href="{{ url_for('index') }}">← Back to Users</a>
</p>

<hr>

<!-- MOVIE LIST -->
<ul>
    {% for movie in movies %}
        <li style="margin-bottom: 20px;">
             {{ movie.title }} 
	<br>
            ({{ movie.year }})

            <br>

            {% if movie.poster_url %}
                <img src="{{ movie.poster_url }}" alt="{{ movie.title }}" width="120">
            {% endif %}

            <p>Director: {{ movie.director }}</p>

            <!-- UPDATE FORM -->
            <form action="{{ url_for('update_movie', user_id=user.id, movie_id=movie.id) }}" method="post">
                <input type="text" name="title" placeholder="New title" required>
                <button type="submit">Update</button>
            </form>

            <!-- DELETE FORM -->
            <form action="{{ url_for('delete_movie', user_id=user.id, movie_id=movie.id) }}" method="post">
                <button type="submit" style="color:red;">Delete</button>
            </form>

        </li>
        <hr>
    {% endfor %}
</ul>

<hr>

<!-- ADD MOVIE -->
<h2>Add Movie</h2>

<form action="{{ url_for('add_movie', user_id=user.id) }}" method="post">

    <label for="title">Movie Title:</label>
    <input type="text" name="title" id="title" required>

    <button type="submit">Add Movie</button>
</form>

{% endblock %}
